version: '3.8'

# IconsAI Scraping - Docker Compose Development
# Uso: docker compose -f docker-compose.dev.yml up -d

services:
  # =============================================
  # Backend Node.js (porta 3001)
  # =============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: iconsai-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=3001
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/package.json:/app/package.json:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - iconsai-network

  # =============================================
  # Backend Python FastAPI (porta 8000)
  # =============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.api.dev
    container_name: iconsai-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - ENVIRONMENT=development
    volumes:
      - ./api:/app/api:ro
      - ./config:/app/config:ro
      - ./backend/src/services:/app/backend/src/services:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - iconsai-network

  # =============================================
  # Frontend Next.js (porta 3000)
  # =============================================
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: iconsai-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_PYTHON_API_URL=http://localhost:8000
    volumes:
      - ./web/src:/app/src:ro
      - ./web/public:/app/public:ro
    depends_on:
      - backend
      - api
    networks:
      - iconsai-network

networks:
  iconsai-network:
    driver: bridge
